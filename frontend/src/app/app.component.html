<div class="app-shell" [class.sidebar-open]="sidebarOpen">
    <div class="overlay" (click)="closeSidebar()"></div>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="10" rx="2" />
                    <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-name">SmartLocker</span>
                <span class="brand-sub">Management System</span>
            </div>
            <button class="sidebar-close" (click)="closeSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <ul class="nav-links">
            <li><a routerLink="/dashboard" routerLinkActive="active" (click)="closeSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a></li>
            <li><a routerLink="/lockers" routerLinkActive="active" (click)="closeSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="2" width="18" height="20" rx="2" />
                        <line x1="9" y1="2" x2="9" y2="22" />
                        <circle cx="6" cy="12" r="1" />
                    </svg>
                    Lockers
                </a></li>
            <li><a routerLink="/delivery" routerLinkActive="active" (click)="closeSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3" />
                        <rect x="9" y="11" width="14" height="10" rx="1" />
                        <circle cx="12" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                    </svg>
                    Store Package
                </a></li>
            <li><a routerLink="/pickup" routerLinkActive="active" (click)="closeSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    Pickup Package
                </a></li>
            <li><a routerLink="/history" routerLinkActive="active" (click)="closeSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    History
                </a></li>
        </ul>

    </nav>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="hamburger" (click)="toggleSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <div class="topbar-brand">
                <div class="brand-icon small">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" />
                        <path d="M9 8h6M9 11h4" />
                    </svg>
                </div>
                <span>SmartLocker</span>
            </div>
        </header>
        <main class="main-content"><router-outlet /></main>
    </div>
</div>
