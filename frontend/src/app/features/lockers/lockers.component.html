
    <div class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">Locker Management</h1>
          <p class="page-sub">View and create locker units</p>
        </div>
        <button class="btn-primary" (click)="showForm.set(!showForm())">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-label">Add Locker</span>
        </button>
      </div>

      <!-- Create form -->
      <div class="form-card" *ngIf="showForm()">
        <h2>Create New Locker</h2>
        <p class="form-sub">Select a size and the locker will be immediately available for deliveries.</p>
        <div class="size-options">
          <div *ngFor="let s of sizes" class="size-option" [class.selected]="selectedSize() === s.value" (click)="selectedSize.set(s.value)">
            <div class="so-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect [attr.x]="s.x" [attr.y]="s.y" [attr.width]="s.w" [attr.height]="s.h" rx="2"/>
              </svg>
            </div>
            <span class="so-label">{{ s.value }}</span>
            <span class="so-dim">{{ s.dim }}</span>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-secondary" (click)="showForm.set(false); selectedSize.set('')">Cancel</button>
          <button class="btn-primary" (click)="submit()" [disabled]="!selectedSize() || svc.loading()">
            {{ svc.loading() ? 'Creating...' : 'Create Locker' }}
          </button>
        </div>
        <div class="alert success" *ngIf="svc.successMsg()">{{ svc.successMsg() }}</div>
        <div class="alert error"   *ngIf="svc.error()">{{ svc.error() }}</div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <div class="filter-scroll">
          <button *ngFor="let f of filters" class="filter-btn"
                  [class.active]="svc.activeFilter() === f"
                  (click)="svc.setFilter(f)">{{ f }}</button>
        </div>
      </div>

      <!-- Locker grid -->
      <div class="lockers-grid" *ngIf="svc.filtered().length > 0">
        <div *ngFor="let locker of svc.filtered()" class="locker-card" [class.occupied]="!locker.isAvailable">
          <div class="locker-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="2" width="18" height="20" rx="2"/><line x1="9" y1="2" x2="9" y2="22"/><circle cx="6" cy="12" r="1"/></svg>
          </div>
          <app-status-badge
            [label]="locker.isAvailable ? 'Available' : 'Occupied'"
            [variant]="locker.isAvailable ? 'available' : 'occupied'" />
          <app-status-badge [label]="locker.size" [variant]="locker.size.toLowerCase() | asVariant" />
          <div class="locker-id">{{ locker.id.slice(0,8) }}...</div>
        </div>
      </div>
      <div class="empty" *ngIf="svc.filtered().length === 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="2" width="18" height="20" rx="2"/></svg>
        <p>No lockers match this filter.</p>
      </div>
    </div>
